<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#dfe7f5">
    <title>Sign in · Go2 Control</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
    <div class="aurora">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <main class="login-card">
        <div class="login-logo">
            <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 11h3l2-3 4 6 2-2h5"/>
                <circle cx="6" cy="18" r="1.4"/><circle cx="18" cy="18" r="1.4"/>
            </svg>
        </div>
        <h1>Go2 Control</h1>
        <p class="login-sub">Sign in to drive the dog.</p>

        <form id="login-form" class="login-form" autocomplete="on">
            <label class="field">
                <span>Username</span>
                <input id="username" type="text" name="username" autocomplete="username" autocapitalize="none" autocorrect="off" required>
            </label>
            <label class="field">
                <span>Password</span>
                <input id="password" type="password" name="password" autocomplete="current-password" required>
            </label>
            <div id="login-error" class="login-error hidden"></div>
            <button id="login-btn" type="submit" class="btn-primary">Sign in</button>
        </form>
    </main>

    <script src="/login.js"></script>
</body>
</html>
