<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unitree Go2 — Voice Control Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Unitree Go2</h1>
            <p class="subtitle">Voice Control Dashboard</p>
        </header>

        <div id="status-bar">
            <span id="ws-status" class="status-indicator disconnected">Disconnected</span>
            <span id="robot-status" class="status-indicator disconnected">Robot: —</span>
            <span id="model-info" class="status-indicator">—</span>
        </div>

        <div id="live-status">
            <div id="state-card" class="status-card idle">
                <span id="state-icon">⏸️</span>
                <span id="state-text">Standby</span>
            </div>
        </div>

        <div id="feedback-area">
            <div id="transcription" class="feedback-card hidden">
                <span class="feedback-label">Heard</span>
                <span id="transcription-text" class="feedback-value"></span>
            </div>
            <div id="command-matched" class="feedback-card hidden">
                <span class="feedback-label">Command</span>
                <span id="matched-command" class="feedback-value"></span>
            </div>
            <div id="command-result" class="feedback-card hidden">
                <span id="result-icon" class="feedback-value"></span>
                <span id="result-message" class="feedback-value"></span>
            </div>
            <div id="error-message" class="feedback-card error hidden">
                <span id="error-text" class="feedback-value"></span>
            </div>
        </div>

        <details id="commands-panel">
            <summary>Available Voice Commands</summary>
            <div id="commands-list"></div>
        </details>

        <footer>
            <p class="hint">Press & hold <strong>Spacebar</strong> on the robot to speak</p>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>
</html>
